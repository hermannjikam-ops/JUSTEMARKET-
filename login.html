<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - JUSTEMARKET</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="particles"></div>
    
    <header class="glass-header">
        <div class="container">
            <div class="logo">
                <div class="logo-3d">
                    <span class="logo-icon">🛍️</span>
                    <span class="logo-text">JUSTEMARKET</span>
                </div>
            </div>
            <nav>
                <a href="index.html">Accueil</a>
                <a href="login.html" class="active">Connexion</a>
                <a href="register.html">Inscription</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="form-container">
            <h2>🔐 Connexion</h2>
            <p class="subtitle">Entrez votre clé d'accès pour gérer votre boutique</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>🔑 Clé d'accès</label>
                    <input type="text" id="accessKey" placeholder="Ex: ABC12345" required>
                </div>
                <button type="submit" class="btn-primary" style="width:100%;">Se connecter</button>
            </form>
            
            <p class="link">Pas encore inscrit ? <a href="register.html">Créer ma boutique</a></p>
            <p class="link" style="margin-top: 10px;">❓ Vous n'avez pas reçu votre clé ? <a href="#" onclick="showHelp()">Contactez Lejuste</a></p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
